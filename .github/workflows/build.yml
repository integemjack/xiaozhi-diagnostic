name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller==6.11.1

      - name: Build EXE
        run: pyinstaller build.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XiaozhiDiagnostic-Windows
          path: dist/XiaozhiDiagnostic.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller==6.11.1

      - name: Build single executable
        run: |
          pyinstaller --onefile --windowed --name XiaozhiDiagnostic-macOS src/main.py --noconfirm
          chmod +x dist/XiaozhiDiagnostic-macOS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XiaozhiDiagnostic-macOS
          path: dist/XiaozhiDiagnostic-macOS

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: XiaozhiDiagnostic-Windows
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: XiaozhiDiagnostic-macOS
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/XiaozhiDiagnostic.exe
            artifacts/XiaozhiDiagnostic-macOS
          generate_release_notes: true
